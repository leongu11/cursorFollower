<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Title</title>
    <script src="face.js" defer></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Mono:ital@0;1&display=swap');

        body {
            /* outline: 5px solid red; */
            display: flex; 
            align-items: center; 
            justify-content: center;
            height: 100vh;
            width: 100vw;
            cursor: none;
        }

        .cursor {
            position: fixed;
            pointer-events: none;
            font-size: 25px;
            transform: translate(-50%, -50%);  
            z-index: 9999;
        }

        .divchange {
            /* outline: 5px solid red; */
            /* display: flex;
            justify-content: center;
            align-items: center; */
            display: block;
            position: absolute;
            top:0;
            left:0;
        }

        .fullwrap {
            position: relative;
            display: inline-block;
            width: 300px;
            height: 500px;
        }
        
        .simps{
            /* 300x500 */
            width: 300px;
            height: 500px;
        }
        .imagechange {
            width:20px;
            height:20px;
            top: 68px;
            left: 112px;
            position: absolute;
        }
        .imagechange2 {
            width:20px;
            height:20px;
            top: 60px;
            left: 145px;
            position: absolute;
        }

        .credit {
            position: fixed;
            bottom: 30px;
            right: 24px;
            font-family: 'Space Mono', monospace;
            font-size: 15px;
            font-style: italic;
            color: transparent;
            background: linear-gradient(90deg, #a0a0a0, #404040);
            -webkit-background-clip: text;
            background-clip: text;
            letter-spacing: 1.5px;
            opacity: 0.6;
            user-select: none;
        }

        .credit span {
            font-style: normal;
            font-weight: 50;
            color: transparent;
            background: linear-gradient(90deg, #2596ff, #0810ff);
            -webkit-background-clip: text;
            background-clip: text;
        }

        .github-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            padding: 10px 24px;
            display: flex;
            align-items: center;
            gap: 10px;
            background: linear-gradient(90deg, #0d0d0d, #1a1a1a);
            border-top: 1px solid #2a2a2a;
            font-family: 'Space Mono', monospace;
            font-size: 12px;
            letter-spacing: 1px;
            z-index: 100;
        }

        .github-bar a {
            color: #c0c0c0;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: color 0.2s ease;
        }

        .github-bar a:hover { color: #ffffff; }

        .github-bar a:hover .gh-icon { fill: #ffffff; }

        .github-bar a:hover ~ .gh-tag { color: #7dff2c; }
        .github-bar a:hover ~ .gh-dot { background: #7dff2c; }

        .gh-icon {
            fill: #c0c0c0;
            transition: fill 0.2s ease;
            flex-shrink: 0;
        }

        .gh-dot {
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: #333;
            margin: 0 4px;
            transition: fill 0.2s ease;

        }

        .gh-tag {
            color: #404040;
            font-size: 10px;
            letter-spacing: 2px;
            text-transform: uppercase;
            transition: fill 0.2s ease;

        }
    </style>
</head>
<body>
